<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="title-lg.webp">
    <title>Netflix India – Watch TV Shows Online, Watch Movies Online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Netflix.css">
</head>
<body>
  <div class="bg"></div>
    <div class="top">
        <header>
            <div class="logo">
                <img src="Netflix-title2.png">
            </div>
            <div class="opt">
                <div class="lang">
                    <label for="lang"></label>
                    <select id="lang" name="lang">
                        <option>English</option>
                        <option>हिन्दी</option>
                    </select>
                </div>
                <div class="log" id="animate">
                    <a href="#">Sign In</a>
                </div>
            </div>
        </header>
        
        <div class="main">
            <h1 class="p1">Unlimited movies, TV</h1>
            <h1 class="p1">shows and more</h1>
            <h3 class="p2">Starts at &#8377;149. Cancel at any time.</h3>
            <p class="p3">Ready to watch? Enter your email to create or restart your membership.</p>
            <div class="sign">
                <input id="int" placeholder="Email address">
                <div class="email" id="animate">
                    <a href="#">Get Started   ></a>
                </div>
            </div>
        </div>
    </div>
    <div class="separation"></div>
    <div class="mid">
        <div class="mid-top">
            <h2 class="trend-title">Trending Now</h2>
            <div class="trend">
                <div class="block" id="a"></div>
                <span class="num" id="one"><i class="fa-solid fa-1"></i></span>
                <div class="block" id="b"></div>
                <span class="num" id="two"><i class="fa-solid fa-2"></i></span>
                <div class="block" id="c"></div>
                <span class="num" id="three"><i class="fa-solid fa-3"></i></span>
                <div class="block" id="d"></div>
                <span class="num" id="four"><i class="fa-solid fa-4"></i></span>
                <div class="block" id="e"></div>
                <span class="num" id="five"><i class="fa-solid fa-5"></i></span>
            </div>
        </div>
    </div>
</body>
</html>
